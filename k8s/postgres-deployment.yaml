apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: parkkbus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: parkkbus
            - name: POSTGRES_USER
              value: parkkbus
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: parkkbus-secret
                  key: SPRING_DATASOURCE_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          emptyDir: {}

